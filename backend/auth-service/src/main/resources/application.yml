server:
  port: 8084

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sailboats_auth}
    username: ${SPRING_DATASOURCE_USERNAME:sailboats}
    password: ${SPRING_DATASOURCE_PASSWORD:sailboats}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
  jwt:
    # Must be >= 32 bytes. Override in production via APP_JWT_SECRET.
    secret: ${APP_JWT_SECRET:dev-only-insecure-secret-change-me-please-0123456789abcdef}
    access-token-ttl-seconds: ${APP_JWT_ACCESS_TTL:900}
  refresh:
    ttl-days: ${APP_REFRESH_TTL_DAYS:30}
  cookie:
    secure: ${APP_COOKIE_SECURE:false}
    same-site: ${APP_COOKIE_SAMESITE:Lax}
