server:
  port: 8081

spring:
  application:
    name: fleet-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sailboats_fleet}
    username: ${SPRING_DATASOURCE_USERNAME:sailboats}
    password: ${SPRING_DATASOURCE_PASSWORD:sailboats}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

management:
  endpoints:
    web:
      exposure:
        include: health,info
